<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="6" viewBox="0 0 1200 6" preserveAspectRatio="none" role="img" aria-label="divider">
  <defs>
    <linearGradient id="grid" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0B0F14"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.5" stop-color="#FF8A00"/>
      <stop offset="1" stop-color="#0B0F14"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="1 0" to="-1 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect x="0" y="2.5" width="1200" height="1" fill="#1b2733"/>
  <rect x="0" y="0" width="1200" height="6" rx="3" fill="url(#ember)" opacity="0.5"/>
  <rect x="0" y="0" width="1200" height="6" rx="3" fill="url(#grid)"/>
</svg>
